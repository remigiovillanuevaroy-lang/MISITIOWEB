<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contacto</title>

<style>

body{
font-family: Arial, sans-serif;
background-color: #f2f2f2;
margin: 0;
padding: 0;
}

header{
background-color: #665a40;
color: white;
text-align: center;
padding: 20px;
}

.contenedor{
width: 60%;
margin: auto;
background: rgb(133, 132, 81);
padding: 30px;
margin-top: 30px;
border-radius: 10px;
box-shadow: 0px 0px 10px gray;
}

label{
font-weight: bold;
}

input, textarea, select{
width: 100%;
padding: 10px;
margin-top: 5px;
margin-bottom: 15px;
border-radius: 5px;
border: 1px solid gray;
}

button{
background-color: #1a1d03;
color: white;
border: none;
padding: 12px 20px;
border-radius: 5px;
cursor: pointer;
}

button:hover{
background-color: #45a049;
}

footer{
text-align: center;
margin-top: 30px;
padding: 20px;
background-color: #333;
color: white;
}

</style>

</head>

<body>

<header>
<h1>Contáctanos</h1>
<p>Envíanos tu consulta</p>
</header>

<div class="contenedor">

<form>

<label>Nombre completo</label>
<input type="text" placeholder="Escribe tu nombre" required>

<label>Correo electrónico</label>
<input type="email" placeholder="ejemplo@email.com" required>

<label>Teléfono</label>
<input type="tel" placeholder="999-999-999">

<label>Tipo de consulta</label>
<select>
<option>Información</option>
<option>Reserva</option>
<option>Reclamo</option>
<option>Sugerencia</option>
</select>

<label>Mensaje</label>
<textarea rows="5" placeholder="Escribe tu mensaje"></textarea>

<button type="submit">Enviar mensaje</button>

</form>

</div>

<footer>

<p>Dirección: Av. nose que poner profe</p>
<p>Teléfono: 928 696 593</p>
<p>Email: remigiovillanuevaroy@gmail.com</p>

</footer>

</body>
</html>
