<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú</title>

<style>

body{
font-family: Arial, sans-serif;
background-color: #f2f2f2;
margin:0;
padding:0;
}

header{
background-color:#555433;
color:white;
text-align:center;
padding:20px;
}

.contenedor{
width:70%;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
color:#88941d;
border-bottom:2px solid #3b4235;
padding-bottom:5px;
}

.menu-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.precio{
font-weight:bold;
color:#333;
}

footer{
text-align:center;
margin-top:30px;
padding:20px;
background:#333;
color:white;
}

</style>

</head>

<body>

<header>
<h1>Nuestro Menú</h1>
<p>Disfruta de nuestras especialidades</p>
</header>

<div class="contenedor">

<h2>Bebidas</h2>

<div class="menu-item">
<span>Espresso</span>
<span class="precio">S/ 6.00</span>
</div>

<div class="menu-item">
<span>Cappuccino</span>
<span class="precio">S/ 8.00</span>
</div>

<div class="menu-item">
<span>Latte</span>
<span class="precio">S/ 9.00</span>
</div>

<div class="menu-item">
<span>Chocolate caliente</span>
<span class="precio">S/ 7.00</span>
</div>

<h2>Postres</h2>

<div class="menu-item">
<span>Torta de chocolate</span>
<span class="precio">S/ 10.00</span>
</div>

<div class="menu-item">
<span>Cheesecake</span>
<span class="precio">S/ 12.00</span>
</div>

<div class="menu-item">
<span>Brownie</span>
<span class="precio">S/ 8.00</span>
</div>

<h2>Desayunos</h2>

<div class="menu-item">
<span>Desayuno americano</span>
<span class="precio">S/ 15.00</span>
</div>

<div class="menu-item">
<span>Sandwich mixto</span>
<span class="precio">S/ 9.00</span>
</div>

</div>

<footer>
<p>© 2026 Café Aroma</p>

</footer>

</body>
</html>
